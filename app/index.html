    <noscript>
      <article>
        <header>
          <h1>Monitor Banjir — Cinangka Paradisa Residence</h1>
          <p>
            Pemantau tinggi muka air dan peringatan dini banjir khusus
            untuk warga perumahan <strong>Cinangka Paradisa Residence</strong>,
            sebuah komplek hunian di Kelurahan Cinangka, Kecamatan
            Sawangan, Kota Depok, Jawa Barat. Data diambil dari pos
            pemantauan Pesanggrahan (P.S. Pesanggrahan 1) milik Dinas
            Sumber Daya Air Provinsi DKI Jakarta dan diperbarui setiap
            ~10 menit.
          </p>
        </header>

        <section>
          <h2>Tentang halaman ini</h2>
          <p>
            Halaman <em>Monitor Banjir Cinangka Paradisa Residence</em>
            menampilkan tinggi muka air Sungai Pesanggrahan terkini,
            status siaga banjir (Normal, Siaga 3, Siaga 2, atau Siaga 1),
            grafik tren 6 jam hingga 60 hari, serta analitik singkat
            seperti puncak terakhir, kecepatan perubahan, dan estimasi
            kapan level akan menyentuh ambang siaga berikutnya.
          </p>
          <p>
            Halaman ini ditujukan untuk warga Cinangka Paradisa, juga
            bermanfaat bagi warga sekitar Cinangka, Sawangan, dan Depok
            secara umum, serta wilayah hilir Sungai Pesanggrahan yang
            ingin memantau tinggi muka air dengan cepat dari ponsel.
          </p>
        </section>

        <section>
          <h2>Lokasi</h2>
          <p>
            <strong>Cinangka Paradisa Residence</strong> adalah komplek
            perumahan yang berada di Kelurahan Cinangka, Kecamatan
            Sawangan, Kota Depok, Provinsi Jawa Barat — di sisi selatan
            Jakarta dan dilewati oleh aliran Sungai Pesanggrahan. Lokasi
            ini termasuk daerah yang berpotensi terdampak ketika debit
            Sungai Pesanggrahan meningkat akibat hujan deras di hulu
            (kawasan Bogor dan Depok bagian selatan).
          </p>
          <p>
            Pos pemantauan Pesanggrahan (P.S. Pesanggrahan 1) berada di
            koordinat sekitar −6.397, 106.772, di Sungai Pesanggrahan
            relatif dekat dengan kawasan Cinangka, Sawangan.
          </p>
        </section>

        <section>
          <h2>Status Siaga di Pos Pesanggrahan</h2>
          <p>
            Empat tingkat status digunakan berdasarkan tinggi muka air:
          </p>
          <ul>
            <li><strong>Normal</strong> — di bawah 150 cm. Tidak ada ancaman banjir di hilir.</li>
            <li><strong>Siaga 3 (Waspada)</strong> — 150 hingga 250 cm. Waspadai kemungkinan kenaikan jika hujan berlanjut.</li>
            <li><strong>Siaga 2 (Siaga)</strong> — 250 hingga 350 cm. Tingkatkan kewaspadaan; siapkan barang berharga di tempat lebih tinggi.</li>
            <li><strong>Siaga 1 (Awas)</strong> — di atas 350 cm. Risiko banjir besar; pertimbangkan evakuasi sesuai arahan RT/RW dan BPBD.</li>
          </ul>
        </section>

        <section>
          <h2>Cara kerja peringatan dini</h2>
          <p>
            Saat tab halaman ini terbuka di peramban, sistem akan
            memberikan notifikasi otomatis dan bunyi peringatan ketika
            tinggi muka air <em>naik</em> melewati salah satu ambang
            siaga. Untuk akses paling cepat saat hujan deras atau musim
            banjir, pasang halaman ini di layar utama ponsel sebagai
            aplikasi (Progressive Web App).
          </p>
          <p>
            Catatan: notifikasi <strong>hanya berbunyi saat tab halaman
            ini terbuka</strong>. Halaman ini bukan layanan push penuh —
            tetap kombinasikan dengan informasi resmi dari BPBD setempat.
          </p>
        </section>

        <section>
          <h2>Sumber data</h2>
          <p>
            Data tinggi muka air berasal dari pos pemantauan Pesanggrahan
            (kode stasiun 34, ID 160) milik <strong>Dinas Sumber Daya
            Air Provinsi DKI Jakarta</strong>, dipublikasikan secara
            terbuka di
            <a href="https://poskobanjir.dsdadki.web.id">
              poskobanjir.dsdadki.web.id
            </a>.
            Halaman ini menampilkan ulang data tersebut dalam tampilan
            ramah ponsel tanpa mengubah nilai. Bukan streaming real-time
            — penyegaran berkala setiap ~10 menit.
          </p>
        </section>

        <section>
          <h2>Pertanyaan sering diajukan</h2>

          <h3>Apakah ini situs resmi pemerintah?</h3>
          <p>
            Bukan. Ini halaman tidak resmi yang dibangun untuk warga
            Cinangka Paradisa Residence. Data sepenuhnya bersumber dari
            laman publik Dinas Sumber Daya Air DKI Jakarta.
          </p>

          <h3>Mengapa pos Pesanggrahan dipilih?</h3>
          <p>
            Pos Pesanggrahan adalah pos pemantauan resmi terdekat
            dengan kawasan Cinangka, Sawangan, Depok yang berada di
            hulu aliran Sungai Pesanggrahan, sehingga kenaikan di pos
            ini menjadi indikator dini banjir di wilayah hilir,
            termasuk perumahan Cinangka Paradisa Residence.
          </p>

          <h3>Cinangka Paradisa Residence ada di mana?</h3>
          <p>
            Komplek perumahan Cinangka Paradisa Residence terletak di
            Kelurahan Cinangka, Kecamatan Sawangan, Kota Depok, Provinsi
            Jawa Barat (kode pos 16518), wilayah perbatasan selatan
            Jakarta yang dilewati Sungai Pesanggrahan.
          </p>

          <h3>Apa artinya bila tinggi muka air bernilai negatif?</h3>
          <p>
            Nilai negatif (misalnya −500 cm) menandakan sensor pos
            sedang offline atau kalibrasi ulang. Halaman ini otomatis
            menyaring nilai tersebut dari grafik dan analitik.
          </p>
        </section>
